spring:
  application:
    name: rag

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ragdb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  ai:
    ollama:
      base-url: ${OLLAMA_URL:http://localhost:11434}

      chat:
        model: ${OLLAMA_CHAT_MODEL:llama3}

      embedding:
        model: ${OLLAMA_EMBED_MODEL:nomic-embed-text}

    vectorstore:
      pgvector:
        initialize-schema: true
        dimensions: 768

logging:
  level:
    org.springframework.ai: DEBUG
    org.apache.pdfbox.pdmodel.font.FileSystemFontProvider: ERROR